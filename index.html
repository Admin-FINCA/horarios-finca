<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UVM Labs - Gestión de Horarios</title>
    
    <!-- Scripts Base -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
        
        :root {
            /* Nueva Paleta Pastel Semántica */
            --brand: #B2F2BB;   /* Mint Pastel (Header) */
            --muted: #D6BCFA;   /* Lavanda (Botones/Secundario) */
            --bg: #F7FAFC;      /* Gris Muy Claro (Fondo) */
            --text: #1A202C;    /* Negro Oscuro (Texto) */
            --accent: #805AD5;  /* Morado (Acentos/Highlights) */
            --border: #E2E8F0;
            --card-bg: #FFFFFF;
        }

        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 0;
        }
        
        /* Scrollbar oculta */
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        .date-picker-container {
            position: relative;
            display: flex;
            align-items: center;
        }
        .native-date-input {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            opacity: 0;
            cursor: pointer;
            z-index: 40;
        }

        /* Tarjeta de edición con acento morado */
        .edit-card {
            background-color: var(--card-bg);
            border: 2px solid var(--accent);
            box-shadow: 0 15px 30px -10px rgba(128, 90, 213, 0.3);
        }
        .edit-input {
            background-color: #F8FAFC;
            border: 1px solid var(--border);
            color: var(--text);
            transition: all 0.2s;
        }
        .edit-input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(128, 90, 213, 0.1);
            outline: none;
        }

        /* Tabla fluida */
        .table-fixed { table-layout: fixed; min-width: 850px; }

        /* Estilo de los bloques de horario */
        .slot-card {
            background-color: #64748b; /* Color base para slots ocupados */
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .slot-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 15px -5px rgba(0,0,0,0.1);
        }
    </style>
</head>
<body class="no-scrollbar">
    <div id="root"></div>

    <!-- Script de Firebase -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-app.js";
        import { getFirestore, collection, doc, setDoc, onSnapshot, query, deleteDoc } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-firestore.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-auth.js";

        window.FB_LIB = { 
            initializeApp, getFirestore, collection, doc, setDoc, onSnapshot, query, deleteDoc, 
            getAuth, signInAnonymously, onAuthStateChanged 
        };
    </script>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef } = React;

        const Icons = {
            Database: (props) => <svg {...props} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><ellipse cx="12" cy="5" rx="9" ry="3"/><path d="M3 5V19A9 3 0 0 0 21 19V5"/><path d="M3 12A9 3 0 0 0 21 12"/></svg>,
            Calendar: (props) => <svg {...props} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect width="18" height="18" x="3" y="4" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>,
            Lock: (props) => <svg {...props} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect width="18" height="11" x="3" y="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>,
            Unlock: (props) => <svg {...props} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect width="18" height="11" x="3" y="11" rx="2" ry="2"/><path d="M7 11V5a5 5 0 0 1 9.9-1"/></svg>,
            ChevronLeft: (props) => <svg {...props} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m15 18-6-6 6-6"/></svg>,
            ChevronRight: (props) => <svg {...props} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m9 18 6-6-6-6"/></svg>,
            Trash: (props) => <svg {...props} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/></svg>,
            Clock: (props) => <svg {...props} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>,
            Save: (props) => <svg {...props} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>
        };

        const LABS = [
            { id: 'minas', name: 'Lab. Minas', color: 'bg-slate-500', icon: '⛏️' },
            { id: 'construccion', name: 'Lab. Construcción', color: 'bg-slate-500', icon: '🏗️' },
            { id: 'robotica', name: 'Lab. Robótica', color: 'bg-slate-500', icon: '🤖' },
            { id: 'agronomia', name: 'Lab. Agronomía', color: 'bg-slate-500', icon: '🌱' },
            { id: 'cava', name: 'Cava', color: 'bg-slate-500', icon: '🍷' }
        ];

        const DIAS = ['Lunes', 'Martes', 'Miércoles', 'Jueves', 'Viernes', 'Sábado'];
        const BLOQUES = Array.from({ length: 14 }, (_, i) => `${8 + i}:00`);

        const App = () => {
            const [isOnline, setIsOnline] = useState(false);
            const [isAdmin, setIsAdmin] = useState(false);
            const [currentLab, setCurrentLab] = useState(LABS[0]);
            const [selectedDate, setSelectedDate] = useState(new Date());
            const [schedules, setSchedules] = useState({});
            const [loading, setLoading] = useState(true);
            
            const [editingSlot, setEditingSlot] = useState(null);
            const [editValues, setEditValues] = useState({ asignatura: "", aula: "" });

            const config = useMemo(() => {
                if (typeof __firebase_config !== 'undefined') {
                    try { return JSON.parse(__firebase_config); } catch (e) { return null; }
                }
                return null;
            }, []);

            const getMonday = (d) => {
                const date = new Date(d);
                const day = date.getDay(), diff = date.getDate() - day + (day === 0 ? -6 : 1);
                const monday = new Date(date.setDate(diff));
                monday.setHours(0,0,0,0);
                return monday;
            };

            const mondayDate = useMemo(() => getMonday(selectedDate), [selectedDate]);

            const formatDateForInput = (date) => {
                const y = date.getFullYear();
                const m = String(date.getMonth() + 1).padStart(2, '0');
                const day = String(date.getDate()).padStart(2, '0');
                return `${y}-${m}-${day}`;
            };

            useEffect(() => {
                const timer = setInterval(() => {
                    if (window.FB_LIB || !config) {
                        clearInterval(timer);
                        initData();
                    }
                }, 100);
                return () => clearInterval(timer);
            }, []);

            const initData = async () => {
                if (config && window.FB_LIB) {
                    setIsOnline(true);
                    try {
                        const app = window.FB_LIB.initializeApp(config);
                        const db = window.FB_LIB.getFirestore(app);
                        const auth = window.FB_LIB.getAuth(app);
                        await window.FB_LIB.signInAnonymously(auth);
                        
                        const q = window.FB_LIB.query(window.FB_LIB.collection(db, 'artifacts', 'uvm-scheduler', 'public', 'data', 'schedules'));
                        window.FB_LIB.onSnapshot(q, (snapshot) => {
                            const data = {};
                            snapshot.forEach(doc => data[doc.id] = doc.data());
                            setSchedules(data);
                            setLoading(false);
                        });
                    } catch (e) {
                        setIsOnline(false);
                        loadOffline();
                    }
                } else {
                    setIsOnline(false);
                    loadOffline();
                }
            };

            const loadOffline = () => {
                const saved = localStorage.getItem('uvm_data');
                if (saved) setSchedules(JSON.parse(saved));
                setLoading(false);
            };

            const toggleAdmin = () => {
                if (isAdmin) {
                    setIsAdmin(false);
                    setEditingSlot(null);
                } else {
                    const pass = prompt("Contraseña Administrativa:");
                    if (pass === "adminUVM") setIsAdmin(true);
                    else if (pass) alert("Clave incorrecta");
                }
            };

            const commitBooking = async (slotId, hora) => {
                const isDeleting = editValues.asignatura.trim() === "" && editValues.aula.trim() === "";
                let newData = { ...schedules };

                if (isDeleting) {
                    delete newData[slotId];
                } else {
                    newData[slotId] = { 
                        asignatura: editValues.asignatura, 
                        aula: editValues.aula,
                        labId: currentLab.id, 
                        time: hora 
                    };
                }

                if (isOnline && window.FB_LIB) {
                    try {
                        const db = window.FB_LIB.getFirestore();
                        const docRef = window.FB_LIB.doc(db, 'artifacts', 'uvm-scheduler', 'public', 'data', 'schedules', slotId);
                        if (isDeleting) await window.FB_LIB.deleteDoc(docRef);
                        else await window.FB_LIB.setDoc(docRef, newData[slotId]);
                    } catch (e) {
                        setSchedules(newData);
                    }
                } else {
                    setSchedules(newData);
                    localStorage.setItem('uvm_data', JSON.stringify(newData));
                }
                setEditingSlot(null);
            };

            if (loading) return (
                <div className="h-screen flex items-center justify-center bg-[#F7FAFC]">
                    <div className="flex flex-col items-center gap-4">
                        <div className="w-12 h-12 border-4 border-[#805AD5] border-t-transparent rounded-full animate-spin"></div>
                        <p className="text-[#805AD5] font-bold uppercase text-xs tracking-widest">Sincronizando UVM</p>
                    </div>
                </div>
            );

            return (
                <div className="min-h-screen pb-10">
                    {/* NAV BAR - Mint Pastel */}
                    <nav className="bg-[#B2F2BB] border-b border-[#A0D9AB] sticky top-0 z-50 px-4 md:px-6 py-4 shadow-sm">
                        <div className="max-w-7xl mx-auto flex flex-col sm:flex-row justify-between items-center gap-4">
                            <div className="flex items-center gap-4">
                                <div className="p-1">
                                    <Icons.Database className="text-[#2D3748] w-7 h-7 md:w-8 md:h-8" />
                                </div>
                                <div>
                                    <h1 className="font-extrabold text-lg md:text-xl text-[#1A202C] tracking-tight leading-none mb-1 uppercase">Laboratorios UVM</h1>
                                    <p className="text-[9px] md:text-[10px] text-[#4A5568] font-bold uppercase tracking-[0.15em] leading-none">Ingeniería, Negocios y Agro</p>
                                </div>
                            </div>

                            <div className="flex items-center gap-3 w-full sm:w-auto justify-center">
                                <div className={`flex items-center gap-2 px-3 py-1.5 rounded-full border text-[9px] md:text-[10px] font-bold uppercase bg-white/50 border-gray-300 text-gray-600`}>
                                    <Icons.Clock className="w-3 h-3" />
                                    {isOnline ? 'En Línea' : 'Local'}
                                </div>
                                <button 
                                    onClick={toggleAdmin}
                                    className={`flex items-center gap-2 px-4 md:px-5 py-2 rounded-xl text-xs md:text-sm font-bold transition-all ${isAdmin ? 'bg-[#805AD5] text-white shadow-md' : 'bg-white border border-gray-300 text-gray-700 hover:bg-gray-50'}`}
                                >
                                    {isAdmin ? <Icons.Unlock className="w-4 h-4" /> : <Icons.Lock className="w-4 h-4" />}
                                    <span className="">{isAdmin ? 'Admin On' : 'Acceso Admin'}</span>
                                </button>
                            </div>
                        </div>
                    </nav>

                    <main className="max-w-7xl mx-auto px-4 md:px-6 py-6 md:py-8 space-y-6 md:space-y-8">
                        {/* Selector de Labs - Estilo Cards Blancas */}
                        <div className="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-5 gap-3 md:gap-4">
                            {LABS.map(lab => (
                                <button 
                                    key={lab.id}
                                    onClick={() => { setCurrentLab(lab); setEditingSlot(null); }}
                                    className={`p-4 md:p-5 rounded-2xl border-2 text-left transition-all ${currentLab.id === lab.id ? `bg-white border-[#805AD5] text-[#805AD5] shadow-lg scale-[1.03]` : 'bg-white border-transparent text-gray-500 hover:border-gray-200 shadow-sm'}`}
                                >
                                    <span className="text-xl md:text-2xl mb-2 block">{lab.icon}</span>
                                    <span className="font-bold text-xs md:text-sm leading-tight">{lab.name}</span>
                                </button>
                            ))}
                        </div>

                        {/* Controles de Fecha - Cava */}
                        {currentLab.id === 'cava' && (
                            <div className="bg-white p-4 md:p-5 rounded-3xl border border-gray-200 flex flex-col md:flex-row items-center justify-between gap-4 md:gap-6 shadow-sm">
                                <div className="flex flex-col sm:flex-row items-center gap-4 w-full md:w-auto">
                                    <div className="flex bg-gray-50 p-1.5 rounded-2xl border border-gray-200 shadow-inner w-full sm:w-auto justify-center">
                                        <button onClick={() => setSelectedDate(new Date(selectedDate.setDate(selectedDate.getDate()-7)))} className="p-2.5 hover:bg-white hover:text-[#805AD5] rounded-xl text-gray-400 transition-colors"><Icons.ChevronLeft className="w-5 h-5" /></button>
                                        <button onClick={() => setSelectedDate(new Date())} className="px-4 text-[11px] font-black uppercase text-gray-500">Hoy</button>
                                        <button onClick={() => setSelectedDate(new Date(selectedDate.setDate(selectedDate.getDate()+7)))} className="p-2.5 hover:bg-white hover:text-[#805AD5] rounded-xl text-gray-400 transition-colors"><Icons.ChevronRight className="w-5 h-5" /></button>
                                    </div>

                                    <div className="date-picker-container group w-full sm:w-auto" onClick={(e) => e.currentTarget.querySelector('input').showPicker?.()}>
                                        <div className="flex items-center gap-4 bg-gray-50 border border-gray-200 px-5 py-2.5 rounded-2xl hover:border-[#805AD5] transition-all justify-center sm:justify-start">
                                            <Icons.Calendar className="w-5 h-5 text-[#805AD5]" />
                                            <div>
                                                <p className="text-[9px] font-black text-gray-400 uppercase leading-none mb-1">Agenda Semanal</p>
                                                <p className="text-xs md:text-sm font-bold text-gray-700 whitespace-nowrap uppercase">
                                                    {mondayDate.toLocaleDateString(undefined, { day: 'numeric', month: 'short' })} - {new Date(mondayDate.getTime() + 5*24*60*60*1000).toLocaleDateString(undefined, { day: 'numeric', month: 'short', year: 'numeric' })}
                                                </p>
                                            </div>
                                        </div>
                                        <input type="date" className="native-date-input" onChange={(e) => setSelectedDate(new Date(e.target.value + 'T12:00:00'))} value={formatDateForInput(selectedDate)} />
                                    </div>
                                </div>
                                <div className="px-6 py-3 bg-[#D6BCFA] text-[#553C9A] rounded-2xl font-black text-[10px] md:text-[11px] flex items-center gap-2 w-full md:w-auto justify-center uppercase shadow-sm">
                                    <span className="w-2 h-2 rounded-full bg-[#805AD5] animate-pulse"></span>
                                    {currentLab.name}
                                </div>
                            </div>
                        )}

                        {/* Grilla Semanal - Light Mode */}
                        <div className="bg-white rounded-[2rem] md:rounded-[2.5rem] shadow-xl border border-gray-100 overflow-hidden">
                            <div className="overflow-x-auto no-scrollbar">
                                <table className="w-full border-collapse table-fixed">
                                    <thead>
                                        <tr className="bg-gray-50 border-b border-gray-100 text-gray-500">
                                            <th className="p-3 w-16 sticky left-0 bg-gray-50 z-20 border-r border-gray-100"><Icons.Clock className="w-4 h-4 mx-auto opacity-50" /></th>
                                            {DIAS.map((dia, idx) => {
                                                const d = new Date(mondayDate);
                                                d.setDate(d.getDate() + idx);
                                                const isToday = d.toDateString() === new Date().toDateString();
                                                return (
                                                    <th key={idx} className={`p-4 border-l border-gray-100 ${isToday ? 'bg-[#B2F2BB]/20 text-[#2D3748]' : ''}`}>
                                                        <p className="text-[10px] md:text-[11px] font-black uppercase tracking-widest">{dia}</p>
                                                        {currentLab.id === 'cava' && (
                                                            <p className="text-[9px] opacity-60 mt-1 font-bold">{d.toLocaleDateString(undefined, { day: 'numeric', month: 'short' })}</p>
                                                        )}
                                                    </th>
                                                );
                                            })}
                                        </tr>
                                    </thead>
                                    <tbody className="divide-y divide-gray-100">
                                        {BLOQUES.map((hora, bloqueIdx) => (
                                            <tr key={hora}>
                                                <td className="p-3 text-center text-[10px] font-bold text-gray-400 bg-gray-50 border-r border-gray-100 sticky left-0 z-10">{hora}</td>
                                                {DIAS.map((_, diaIdx) => {
                                                    const d = new Date(mondayDate);
                                                    d.setDate(d.getDate() + diaIdx);
                                                    
                                                    const dateId = currentLab.id === 'cava' ? formatDateForInput(d) : `day_${diaIdx}`;
                                                    const slotId = `${currentLab.id}_${dateId}_${hora.replace(':', '')}`;
                                                    
                                                    const booking = schedules[slotId];
                                                    const isEditing = editingSlot === slotId;

                                                    return (
                                                        <td 
                                                            key={diaIdx} 
                                                            className={`p-1.5 border-l border-gray-100 h-32 align-top transition-all ${isAdmin ? 'cursor-pointer hover:bg-[#F7FAFC]' : ''}`}
                                                            onClick={() => {
                                                                if (isAdmin && !isEditing) {
                                                                    setEditingSlot(slotId);
                                                                    setEditValues({ asignatura: booking?.asignatura || "", aula: booking?.aula || "" });
                                                                }
                                                            }}
                                                        >
                                                            {isEditing ? (
                                                                <div className="edit-card w-full h-full rounded-xl p-2.5 flex flex-col gap-1.5 relative z-30 overflow-hidden" onClick={e => e.stopPropagation()}>
                                                                    <div className="flex justify-between items-center">
                                                                        <span className="text-[7px] font-black text-gray-400 uppercase tracking-widest">CLAVE {bloqueIdx + 1}</span>
                                                                        <div className="flex gap-1">
                                                                            <button onClick={() => commitBooking(slotId, hora)} className="text-[#805AD5] hover:text-[#553C9A] p-0.5"><Icons.Save size={12} /></button>
                                                                            <button onClick={() => setEditingSlot(null)} className="text-gray-400 hover:text-red-500 p-0.5"><Icons.Trash size={12} /></button>
                                                                        </div>
                                                                    </div>
                                                                    <textarea
                                                                        autoFocus
                                                                        placeholder="Asignatura..."
                                                                        className="edit-input w-full p-2 text-[10px] font-bold rounded-md h-14 resize-none leading-tight"
                                                                        value={editValues.asignatura}
                                                                        onChange={(e) => setEditValues({...editValues, asignatura: e.target.value})}
                                                                    />
                                                                    <input
                                                                        placeholder="Docente / Aula..."
                                                                        className="edit-input w-full p-1.5 text-[9px] font-bold rounded-md"
                                                                        value={editValues.aula}
                                                                        onChange={(e) => setEditValues({...editValues, aula: e.target.value})}
                                                                        onKeyDown={(e) => {
                                                                            if (e.key === 'Enter') commitBooking(slotId, hora);
                                                                            if (e.key === 'Escape') setEditingSlot(null);
                                                                        }}
                                                                    />
                                                                </div>
                                                            ) : booking ? (
                                                                <div className={`h-full w-full rounded-2xl p-3 shadow-sm flex flex-col justify-between transition-all slot-card bg-[#D6BCFA] text-[#2D3748] border-b-4 border-[#B794F4]`}>
                                                                    <div className="flex justify-between items-start opacity-70">
                                                                        <span className="text-[7px] font-black uppercase tracking-widest">CLAVE {bloqueIdx + 1}</span>
                                                                        {isAdmin && <Icons.Unlock className="w-2.5 h-2.5 text-[#805AD5]" />}
                                                                    </div>
                                                                    <div className="mt-1">
                                                                        <p className="font-extrabold text-[9px] md:text-[10px] leading-tight line-clamp-3 tracking-tight uppercase">{booking.asignatura}</p>
                                                                        {booking.aula && <p className="text-[8px] opacity-80 font-bold mt-1 italic truncate bg-white/40 px-1.5 py-0.5 rounded-md">{booking.aula}</p>}
                                                                    </div>
                                                                </div>
                                                            ) : (
                                                                <div className={`h-full w-full border-2 border-dashed border-gray-100 rounded-xl flex items-center justify-center transition-all ${isAdmin ? 'hover:border-[#D6BCFA] hover:bg-[#D6BCFA]/10' : 'opacity-10'}`}>
                                                                    {isAdmin && <span className="text-[9px] font-black text-[#D6BCFA] uppercase opacity-0 group-hover:opacity-100 transition-opacity tracking-tighter">Asignar</span>}
                                                                </div>
                                                            )}
                                                        </td>
                                                    );
                                                })}
                                            </tr>
                                        ))}
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    </main>

                    <footer className="text-center py-10 opacity-60">
                        <div className="inline-flex flex-col items-center gap-2 px-4">
                            <div className="h-1 w-12 bg-[#805AD5] rounded-full"></div>
                            <p className="text-[10px] text-[#1A202C] font-black uppercase tracking-[0.4em]">UVM Ingeniería</p>
                            <p className="text-[8px] text-gray-500 font-bold uppercase tracking-widest mt-1 text-center">Facultad de Ingeniería, Negocios y Agroambientales</p>
                        </div>
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
