<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Horario Facultad de Ingeniería - UVM</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React y Babel -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Firebase SDK (Compat) -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        
        html, body { 
            font-family: 'Inter', sans-serif; 
            background-color: #0f172a; 
            margin: 0; 
            color: white;
            min-height: 100vh;
            overflow-x: hidden;
            overflow-y: auto !important; 
            scroll-behavior: smooth;
        }

        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: #0f172a; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; border: 2px solid #0f172a; }

        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-5px); } 75% { transform: translateX(5px); } }
        .animate-shake { animation: shake 0.2s ease-in-out 0s 2; }
        
        @keyframes spin-slow { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        .animate-spin-slow { animation: spin-slow 1.5s linear infinite; }

        .input-admin {
            background: rgba(15, 23, 42, 0.95);
            border: 2px solid #475569;
            border-radius: 0.75rem;
            padding: 0.75rem;
            color: white;
            width: 100%;
            outline: none;
            transition: all 0.2s;
        }
        .input-admin:focus { border-color: #3b82f6; background: #1e293b; }

        .input-admin-sm {
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid #475569;
            border-radius: 0.4rem;
            padding: 0.3rem;
            color: white;
            width: 100%;
            font-size: 11px;
            outline: none;
            min-height: 35px;
        }

        .weekly-grid {
            display: grid;
            grid-template-columns: 60px repeat(6, 1fr);
            gap: 6px;
            min-width: 900px; 
        }

        @media (min-width: 768px) {
            .weekly-grid {
                grid-template-columns: 80px repeat(6, 1fr);
                gap: 10px;
                min-width: 1200px;
            }
        }
        
        .subject-text { word-break: break-word; overflow-wrap: break-word; line-height: 1.3; }
        .faq-card { background: rgba(30, 41, 59, 0.5); border-left: 4px solid #3b82f6; transition: all 0.3s ease; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, Fragment, useRef, useCallback } = React;

        const firebaseConfig = {
            apiKey: "AIzaSyCjXzraYD1gVajJgLedKTQ4SusoLM5fzLM",
            authDomain: "horarios-uvm.firebaseapp.com",
            projectId: "horarios-uvm",
            storageBucket: "horarios-uvm.firebasestorage.app",
            messagingSenderId: "378691379033",
            appId: "1:378691379033:web:ac841cf0d1d2446a7af648"
        };

        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        /* 🔐 UID ADMINISTRADOR AUTORIZADO */
        const ADMIN_UID = "6HmCH1dusWV0UGPU2gST4AUaCrJ2";

        const CAREERS = [
            { id: "industrial", name: "Ingeniería Civil Industrial", color: "bg-blue-600" },
            { id: "informatica", name: "Ingeniería Civil Informática", color: "bg-green-600" },
            { id: "comercial", name: "Ingeniería Comercial", color: "bg-orange-600" },
            { id: "construccion", name: "Ingeniería en Construcción", color: "bg-red-600" },
            { id: "prevencion", name: "Ingeniería en Prevención de Riesgos", color: "bg-gray-700" },
            { id: "agronomia", name: "Agronomía", color: "bg-emerald-600" },
            { id: "contador", name: "Contador Auditor", color: "bg-purple-600" },
            { id: "minas", name: "Ingeniería Civil de Minas", color: "bg-slate-600" },
        ];

        const YEARS = ["1", "2", "3", "4", "5"];
        const DAYS = ["Lunes", "Martes", "Miércoles", "Jueves", "Viernes", "Sábado"];
        const HOURS = [
            "08:20 - 09:05", "09:05 - 09:50", "10:00 - 10:45", "10:45 - 11:30",
            "11:40 - 12:25", "12:25 - 13:10", "13:20 - 14:05", "14:05 - 14:50",
            "15:00 - 15:45", "15:45 - 16:30", "16:40 - 17:25", "17:25 - 18:10",
            "18:20 - 19:05", "19:05 - 19:50", "20:00 - 20:45"
        ];

        const Icon = ({ name, size = 24, className = "" }) => {
            const icons = {
                Clock: <path d="M12 6v6l4 2" />,
                Calendar: <Fragment><rect x="3" y="4" width="18" height="18" rx="2" ry="2" /><line x1="16" y1="2" x2="16" y2="6" /><line x1="8" y1="2" x2="8" y2="6" /><line x1="3" y1="10" x2="21" y2="10" /></Fragment>,
                ChevronRight: <path d="m9 18 6-6-6-6" />,
                ChevronLeft: <path d="m15 18-6-6 6-6" />,
                Pause: <Fragment><rect x="6" y="4" width="4" height="16" /><rect x="14" y="4" width="4" height="16" /></Fragment>,
                Play: <path d="m5 3 14 9-14 9V3z" />,
                Lock: <Fragment><rect x="3" y="11" width="18" height="11" rx="2" ry="2" /><path d="M7 11V7a5 5 0 0 1 10 0v4" /></Fragment>,
                GraduationCap: <Fragment><path d="M22 10v6M2 10l10-5 10 5-10 5z" /><path d="M6 12v5c3 3 9 3 12 0v-5" /></Fragment>,
                Monitor: <Fragment><rect x="2" y="3" width="20" height="14" rx="2" /><line x1="8" y1="21" x2="16" y2="21" /><line x1="12" y1="17" x2="12" y2="21" /></Fragment>,
                Save: <Fragment><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z" /><polyline points="17 21 17 13 7 13 7 21" /><polyline points="7 3 7 8 15 8" /></Fragment>,
                Wifi: <Fragment><path d="M5 12.55a11 11 0 0 1 14.08 0" /><path d="M1.42 9a16 16 0 0 1 21.16 0" /><path d="M8.53 16.11a6 6 0 0 1 6.95 0" /><line x1="12" y1="20" x2="12.01" y2="20" /></Fragment>,
                WifiOff: <Fragment><line x1="1" y1="1" x2="23" y2="23" /><path d="M16.72 11.06A10.94 10.94 0 0 1 19 12.55" /><path d="M5 12.55a10.94 10.94 0 0 1 5.17-2.39" /><path d="M10.71 5.05A16 16 0 0 1 22.58 9" /><path d="M1.42 9a15.91 15.91 0 0 1 4.7-2.88" /><path d="M8.53 16.11a6 6 0 0 1 6.95 0" /><line x1="12" y1="20" x2="12.01" y2="20" /></Fragment>,
                HelpCircle: <Fragment><circle cx="12" cy="12" r="10" /><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3" /><line x1="12" y1="17" x2="12.01" y2="17" /></Fragment>,
                X: <Fragment><line x1="18" y1="6" x2="6" y2="18" /><line x1="6" y1="6" x2="18" y2="18" /></Fragment>,
                Google: <Fragment><path d="M12 5.42c1.93 0 3.48.66 4.66 1.78l3.48-3.48C18.04 1.76 15.28 1 12 1 7.58 1 3.84 3.55 2.04 7.24l4.08 3.16C7.12 7.74 9.3 5.42 12 5.42z" fill="#EA4335"/><path d="M23.49 12.27c0-.82-.07-1.61-.21-2.38H12v4.51h6.44c-.28 1.51-1.13 2.78-2.4 3.64l3.73 2.89c2.18-2.01 3.44-4.97 3.44-8.66z" fill="#4285F4"/><path d="M6.12 14.76c-.24-.71-.38-1.47-.38-2.26s.14-1.55.38-2.26L2.04 7.24C1.3 8.67 1 10.29 1 12s.3 3.33 1.04 4.76l4.08-3.16z" fill="#FBBC05"/><path d="M12 23c3.28 0 6.04-1.08 8.05-2.92l-3.73-2.89c-1.1.73-2.5 1.17-4.32 1.17-2.7 0-4.88-1.83-5.88-4.3l-4.08 3.16C3.84 20.45 7.58 23 12 23z" fill="#34A853"/></Fragment>
            };
            return <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>{icons[name]}</svg>;
        };

        const App = () => {
            const [user, setUser] = useState(null);
            const [currentCareerIdx, setCurrentCareerIdx] = useState(0);
            const [selectedYear, setSelectedYear] = useState("1");
            const [viewMode, setViewMode] = useState('daily');
            const [currentTime, setCurrentTime] = useState(new Date());
            const [isAutoPlaying, setIsAutoPlaying] = useState(true);
            const [isAdminMode, setIsAdminMode] = useState(false);
            const [showPassModal, setShowPassModal] = useState(false);
            const [showFAQ, setShowFAQ] = useState(false);
            const [passError, setPassError] = useState(false);
            const [schedules, setSchedules] = useState({});
            const [saveStatus, setSaveStatus] = useState('saved'); 
            const [isSystemReady, setIsSystemReady] = useState(false);
            const [isOffline, setIsOffline] = useState(true);

            /* 🔥 LOGIN REAL CON GOOGLE Y RESTRICCIÓN UID */
            useEffect(() => {
                const unsubscribe = auth.onAuthStateChanged(u => {
                    setUser(u);
                    if (u && u.uid === ADMIN_UID) {
                        setIsAdminMode(true);
                    } else {
                        setIsAdminMode(false);
                    }
                    setIsSystemReady(true);
                });
                return () => unsubscribe();
            }, []);

            const loginAdmin = async () => {
                try {
                    const provider = new firebase.auth.GoogleAuthProvider();
                    const result = await auth.signInWithPopup(provider);

                    if (result.user.uid === ADMIN_UID) {
                        setIsAdminMode(true);
                        setShowPassModal(false);
                        setPassError(false);
                    } else {
                        setPassError(true);
                        auth.signOut();
                    }
                } catch (err) {
                    console.error(err);
                    setPassError(true);
                }
            };

            const logoutAdmin = () => {
                auth.signOut();
                setIsAdminMode(false);
            };

            useEffect(() => {
                if (!isSystemReady) return;
                const unsubscribe = db.collection('schedules').onSnapshot((snap) => {
                    const data = {};
                    snap.forEach(doc => data[doc.id] = doc.data().slots);
                    setSchedules(prev => ({...prev, ...data}));
                    setIsOffline(false);
                }, (err) => { console.error(err); setIsOffline(true); });
                return () => unsubscribe();
            }, [isSystemReady]);

            useEffect(() => {
                const t = setInterval(() => setCurrentTime(new Date()), 1000);
                const r = setInterval(() => {
                    if (isAutoPlaying && !isAdminMode && !showPassModal && !showFAQ) {
                        setCurrentCareerIdx(p => (p + 1) % CAREERS.length);
                    }
                }, 15000);
                return () => { clearInterval(t); clearInterval(r); };
            }, [isAutoPlaying, isAdminMode, showPassModal, showFAQ]);

            const persistToCloud = useCallback(async (forcedData = null) => {
                if (isOffline) return;
                setSaveStatus('saving');
                const careerId = CAREERS[currentCareerIdx].id;
                const docId = `${careerId}-${selectedYear}`;
                const dataToSave = forcedData || schedules[docId];
                if (!dataToSave) { setSaveStatus('saved'); return; }
                try {
                    await db.collection('schedules').doc(docId).set({ slots: dataToSave }, { merge: true });
                    setSaveStatus('saved');
                } catch (e) { console.error(e); setSaveStatus('pending'); }
            }, [isOffline, currentCareerIdx, selectedYear, schedules]);

            const handleUpdate = (careerId, year, day, hIdx, field, value) => {
                if (!isAdminMode) return;
                const docId = `${careerId}-${year}`;
                setSaveStatus('pending');
                setSchedules(prev => {
                    const next = JSON.parse(JSON.stringify(prev));
                    if (!next[docId]) next[docId] = {};
                    if (!next[docId][day]) next[docId][day] = HOURS.map(h => ({ hour: h, subject: '', room: '' }));
                    next[docId][day][hIdx][field] = value;
                    return next;
                });
            };

            const career = CAREERS[currentCareerIdx];
            const currentDayName = DAYS[Math.min(currentTime.getDay() - 1, 5)] || "Lunes";
            const currentSchedule = schedules[`${career.id}-${selectedYear}`] || {};

            if (!isSystemReady) return <div className="min-h-screen bg-slate-950 flex items-center justify-center font-black uppercase text-blue-400 animate-pulse text-sm">Conectando Servidor UVM...</div>;

            return (
                <div className="flex flex-col min-h-screen bg-slate-900 overflow-x-hidden relative">
                    <button onClick={() => setShowFAQ(true)} className="fixed bottom-24 right-4 md:right-8 z-[60] bg-blue-600 text-white p-4 md:p-5 rounded-full shadow-2xl animate-bounce"><Icon name="HelpCircle" size={32} /></button>

                    <header className="bg-slate-800 border-b border-slate-700 px-4 md:px-8 py-3 md:py-5 flex flex-wrap justify-between items-center shadow-xl z-20 shrink-0">
                        <div className="flex items-center gap-3 md:gap-6">
                            <div className="bg-white p-1 rounded-xl shadow-lg w-16 h-16 md:w-28 md:h-28 flex items-center justify-center overflow-hidden shrink-0">
                                <img src="Logo_UVM.png" alt="Logo UVM" className="max-w-full max-h-full object-contain" />
                            </div>
                            <div>
                                <h1 className="text-sm md:text-xl lg:text-2xl font-black uppercase tracking-tight text-white leading-tight">Facultad de Ingeniería, Negocios <br className="hidden md:block"/> y Ciencias Agroambientales</h1>
                                <p className="text-slate-400 text-[8px] md:text-xs font-bold uppercase tracking-[0.2em] mt-1 italic">Gestión Centralizada • UVM</p>
                            </div>
                        </div>
                        <div className="flex items-center gap-4 md:gap-8 mt-2 md:mt-0 ml-auto md:ml-0">
                            <div className="text-right">
                                <div className="text-xl md:text-3xl font-mono font-bold text-blue-400 leading-none">{currentTime.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit' })}</div>
                                <div className="text-[7px] md:text-[10px] text-slate-500 uppercase font-black mt-1 md:mt-2 tracking-widest">{currentTime.toLocaleDateString('es-ES', { weekday: 'long', day: 'numeric', month: 'long' })}</div>
                            </div>
                            {isAdminMode && (
                                <button onClick={() => persistToCloud()} disabled={isOffline || saveStatus === 'saving'} className={`p-3 md:p-5 rounded-xl md:rounded-2xl border-2 md:border-4 ${isOffline ? 'text-gray-600' : saveStatus === 'saved' ? 'text-green-500 border-green-500/20' : 'text-yellow-500 border-yellow-500 animate-bounce'}`}><Icon name={isOffline ? "WifiOff" : "Save"} size={32} /></button>
                            )}
                        </div>
                    </header>

                    <div className={`${career.color} py-3 md:py-5 px-4 md:px-8 flex justify-between items-center shadow-2xl sticky top-0 z-10 transition-colors duration-1000`}>
                        <button onClick={() => {setCurrentCareerIdx(p => (p - 1 + CAREERS.length) % CAREERS.length); setIsAutoPlaying(false)}} className="p-2 md:p-3 text-white"><Icon name="ChevronLeft" size={32} /></button>
                        <div className="text-center font-black flex-1">
                            <h2 className="text-lg md:text-2xl lg:text-3xl uppercase tracking-tighter drop-shadow-2xl">{career.name}</h2>
                            <div className="flex items-center justify-center gap-2 md:gap-4 mt-1 md:mt-2 opacity-90 uppercase text-[7px] md:text-[10px] tracking-widest font-black">
                                <Icon name="GraduationCap" size={12} /> {selectedYear}{selectedYear === "1" || selectedYear === "3" ? "ER" : selectedYear === "2" ? "DO" : "TO"} AÑO ACADÉMICO • CARRERA {currentCareerIdx+1}/8
                            </div>
                        </div>
                        <button onClick={() => {setCurrentCareerIdx(p => (p + 1) % CAREERS.length); setIsAutoPlaying(false)}} className="p-2 md:p-3 text-white"><Icon name="ChevronRight" size={32} /></button>
                    </div>

                    <main className="flex-1 p-4 md:p-10 flex flex-col gap-6">
                        <div className="flex flex-col items-center gap-4">
                            <div className="flex flex-wrap justify-center gap-1 md:gap-2 bg-slate-800 p-1.5 md:p-2.5 rounded-2xl md:rounded-3xl border border-slate-700 shadow-2xl">
                                {YEARS.map(y => <button key={y} onClick={() => setSelectedYear(y)} className={`px-4 md:px-10 py-2 md:py-3.5 rounded-xl md:rounded-2xl text-[10px] md:text-sm font-black uppercase ${selectedYear === y ? 'bg-blue-600 text-white' : 'text-slate-500'}`}>{y}er año</button>)}
                            </div>
                            <div className="flex gap-4">
                                <button onClick={() => setViewMode('daily')} className={`px-6 md:px-12 py-2 md:py-4 rounded-xl border-2 font-black text-xs ${viewMode === 'daily' ? 'bg-white text-slate-900 border-white' : 'bg-slate-800 text-slate-400 border-slate-700'}`}>DIARIO</button>
                                <button onClick={() => setViewMode('weekly')} className={`px-6 md:px-12 py-2 md:py-4 rounded-xl border-2 font-black text-xs ${viewMode === 'weekly' ? 'bg-white text-slate-900 border-white' : 'bg-slate-800 text-slate-400 border-slate-700'}`}>SEMANAL</button>
                            </div>
                        </div>

                        <div className="w-full mb-10 max-w-[1400px] mx-auto">
                            {viewMode === 'daily' ? (
                                <div className="space-y-4 md:space-y-6 max-w-5xl mx-auto">
                                    <h3 className="text-center text-blue-400 font-black uppercase text-xl md:text-2xl italic">Programación de {currentDayName}</h3>
                                    {HOURS.map((h, i) => {
                                        const slot = (currentSchedule[currentDayName] || [])[i] || { hour: h, subject: '', room: '' };
                                        return (
                                            <div key={i} className={`flex items-center p-4 md:p-7 rounded-2xl bg-slate-800 border-l-[10px] ${slot.subject ? 'border-blue-500' : 'opacity-20 border-dashed border-slate-700'}`}>
                                                <div className="w-24 md:w-48 text-xs md:text-lg font-mono font-bold text-slate-200 shrink-0">
                                                    <span className="text-[8px] md:text-[10px] text-slate-50 block font-black">CLAVE {i+1}</span>{h}
                                                </div>
                                                {isAdminMode ? (
                                                    <div className="flex-1 flex flex-col md:flex-row gap-2 ml-4">
                                                        <textarea rows="1" placeholder="Materia..." className="input-admin text-sm" value={slot.subject} onChange={e => handleUpdate(career.id, selectedYear, currentDayName, i, 'subject', e.target.value)} />
                                                        <input type="text" placeholder="Aula" className="input-admin w-24 text-center text-blue-400" value={slot.room} onChange={e => handleUpdate(career.id, selectedYear, currentDayName, i, 'room', e.target.value)} />
                                                    </div>
                                                ) : (
                                                    <div className="flex-1 ml-4 overflow-hidden font-black">
                                                        <div className="text-lg md:text-3xl uppercase truncate">{slot.subject || "BLOQUE LIBRE"}</div>
                                                        {slot.subject && <div className="text-blue-400 uppercase text-[10px] md:text-lg">SALA {slot.room}</div>}
                                                    </div>
                                                )}
                                            </div>
                                        );
                                    })}
                                </div>
                            ) : (
                                <div className="overflow-x-auto custom-scrollbar">
                                    <div className="weekly-grid">
                                        <div className="h-10 md:h-16 flex items-center justify-center font-black text-slate-600 uppercase text-[8px] md:text-xs tracking-widest">Clave</div>
                                        {DAYS.map(day => <div key={day} className={`p-2 md:p-5 rounded-xl text-center font-black text-[10px] md:text-sm uppercase ${day === currentDayName ? 'bg-blue-600 text-white' : 'bg-slate-700 text-slate-400'}`}>{day}</div>)}
                                        {HOURS.map((h, hIdx) => (
                                            <Fragment key={hIdx}>
                                                <div className="flex flex-col justify-center items-center text-[10px] md:text-[11px] font-mono font-bold text-slate-50">
                                                    <span className="font-black text-slate-50">C{hIdx + 1}</span>
                                                    <span className="mt-1 text-[7px] md:text-[9px] text-slate-100">{h.split(' - ')[0]}</span>
                                                </div>
                                                {DAYS.map(day => {
                                                    const slot = (schedules[`${career.id}-${selectedYear}`]?.[day] || [])[hIdx] || { subject: '', room: '' };
                                                    return (
                                                        <div key={day + hIdx} className={`p-2 rounded-xl min-h-[45px] flex flex-col border ${slot.subject ? 'bg-slate-800 border-slate-600 shadow-2xl' : 'bg-slate-800/10 opacity-20'}`}>
                                                            <div className="text-[7px] md:text-[9px] font-mono text-slate-50 border-b border-slate-700 pb-1 mb-1">CLAVE {hIdx+1}</div>
                                                            {isAdminMode ? <div className="flex flex-col gap-1 h-full"><textarea className="input-admin-sm text-[9px]" value={slot.subject} onChange={e => handleUpdate(career.id, selectedYear, day, hIdx, 'subject', e.target.value)} /><input className="input-admin-sm text-center text-blue-400 py-0.5" value={slot.room} onChange={e => handleUpdate(career.id, selectedYear, day, hIdx, 'room', e.target.value)} /></div>
                                                            : <Fragment><div className="text-[10px] md:text-[13px] font-black leading-tight text-white/90 truncate">{slot.subject}</div>{slot.subject && <div className="text-[8px] md:text-[11px] text-blue-400 font-black mt-auto">SALA {slot.room}</div>}</Fragment>}
                                                        </div>
                                                    );
                                                })}
                                            </Fragment>
                                        ))}
                                    </div>
                                </div>
                            )}
                        </div>
                    </main>

                    <footer className="bg-slate-800 border-t border-slate-700 p-4 md:p-8 flex flex-wrap justify-between items-center gap-4 shrink-0 shadow-2xl">
                        <div className="flex gap-3 md:gap-6 w-full md:w-auto">
                            <button onClick={() => setIsAutoPlaying(!isAutoPlaying)} className={`flex-1 md:flex-none flex items-center justify-center gap-2 px-4 md:px-8 py-2.5 md:py-4 rounded-xl border-2 ${isAutoPlaying ? 'bg-green-600/10 border-green-500 text-green-500' : 'bg-slate-700 border-slate-600 text-slate-400'}`}>
                                <Icon name={isAutoPlaying ? "Pause" : "Play"} size={20}/> <span className="text-[10px] md:text-sm font-black uppercase">{isAutoPlaying ? 'ROTACIÓN ON' : 'PAUSA'}</span>
                            </button>
                            <button onClick={() => isAdminMode ? logoutAdmin() : setShowPassModal(true)} className={`flex-1 md:flex-none flex items-center justify-center gap-2 px-4 md:px-8 py-2.5 md:py-4 rounded-xl border-2 ${isAdminMode ? 'bg-red-600 border-red-500 text-white' : 'bg-slate-700 border-slate-600 text-slate-400 hover:text-white'}`}>
                                <Icon name={isAdminMode ? "ChevronLeft" : "Lock"} size={20}/> <span className="text-[10px] md:text-sm font-black uppercase">{isAdminMode ? 'SALIR' : 'ADMIN'}</span>
                            </button>
                        </div>
                        <div className="flex items-center gap-4 bg-slate-900/50 px-4 md:px-8 py-2 md:py-3 rounded-full border border-slate-700 shadow-inner ml-auto md:ml-0">
                            <div className={`flex items-center gap-2 ${isOffline ? 'text-red-500 animate-pulse' : 'text-green-500'}`}>
                                <Icon name={isOffline ? "WifiOff" : "Wifi"} size={18} />
                                <span className="font-black text-[9px] md:text-[11px] uppercase tracking-tighter">{isOffline ? 'SIN CONEXIÓN' : saveStatus === 'saved' ? 'SISTEMA SINCRONIZADO' : 'GUARDANDO...'}</span>
                            </div>
                            <div className="h-4 w-px bg-slate-700"></div>
                            <div className="flex items-center gap-2 text-slate-500 font-black italic"><Icon name="Monitor" size={18}/><span className="font-black text-[9px] md:text-[11px]">FINCA 2026</span></div>
                        </div>
                    </footer>

                    {showFAQ && (
                        <div className="fixed inset-0 bg-slate-950/95 backdrop-blur-xl flex items-center justify-center z-[100] p-4">
                            <div className="bg-slate-900 border-2 border-slate-700 p-6 md:p-12 rounded-3xl max-w-3xl w-full relative max-h-[85vh] overflow-y-auto">
                                <button onClick={() => setShowFAQ(false)} className="absolute top-6 right-6 text-slate-500"><Icon name="X" size={32}/></button>
                                <div className="mb-6 text-blue-500 flex justify-center"><Icon name="HelpCircle" size={60} /></div>
                                <h3 className="text-2xl md:text-4xl font-black uppercase text-center mb-6">Ayuda y FAQ</h3>
                                <div className="space-y-4">
                                    <div className="faq-card p-4 rounded-xl"><h4 className="text-blue-400 font-black text-sm uppercase">¿Qué son las Claves?</h4><p className="text-slate-300 text-xs">Bloques de 45 min de 08:20 a 20:45 hrs.</p></div>
                                    <div className="faq-card p-4 rounded-xl"><h4 className="text-blue-400 font-black text-sm uppercase">¿Cómo editar?</h4><p className="text-slate-300 text-xs">Modo Admin -> Login Google -> Editar -> Guardar.</p></div>
                                </div>
                                <div className="mt-8 text-center"><button onClick={() => setShowFAQ(false)} className="bg-slate-700 py-4 px-8 rounded-2xl font-black text-white uppercase text-xs">Cerrar</button></div>
                            </div>
                        </div>
                    )}

                    {showPassModal && (
                        <div className="fixed inset-0 bg-slate-950/98 backdrop-blur-2xl flex items-center justify-center z-[100] p-4">
                            <div className="bg-slate-800 border-2 border-slate-700 p-6 md:p-10 rounded-2xl max-w-sm w-full font-black shadow-2xl text-center">
                                <div className="mb-6 text-blue-500 flex justify-center"><Icon name="Lock" size={40} /></div>
                                <h3 className="text-lg font-black uppercase mb-3">Acceso Administrador</h3>
                                <p className="text-slate-400 text-xs mb-8 px-2">Solo los correos autorizados por la Facultad pueden editar contenidos.</p>
                                
                                <button 
                                    onClick={loginAdmin}
                                    className="w-full bg-white text-slate-900 px-6 py-4 rounded-xl font-bold flex items-center justify-center gap-4 hover:bg-slate-100 transition-all active:scale-95 mb-4 shadow-xl shadow-white/10"
                                >
                                    <Icon name="Google" size={24} />
                                    Iniciar sesión con Google
                                </button>

                                {passError && (
                                    <p className="text-red-500 text-[10px] font-bold mb-4 uppercase animate-shake">
                                        ❌ Usuario no autorizado para gestión
                                    </p>
                                )}

                                <button onClick={() => {setShowPassModal(false); setPassError(false);}} className="block mx-auto mt-4 text-slate-500 hover:text-white transition-all uppercase text-[10px] tracking-widest font-black italic">Cancelar Acceso</button>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
