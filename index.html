<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Horario UVM Seguro</title>

<script src="https://cdn.tailwindcss.com"></script>

<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

<style>
body { background:#0f172a; color:white; font-family:Arial; }
</style>
</head>

<body>
<div id="root"></div>

<script type="text/babel">

const { useState, useEffect } = React;

/* ================= FIREBASE ================= */
const firebaseConfig = {
            apiKey: "AIzaSyCjXzraYD1gVajJgLedKTQ4SusoLM5fzLM",
            authDomain: "horarios-uvm.firebaseapp.com",
            projectId: "horarios-uvm",
            storageBucket: "horarios-uvm.firebasestorage.app",
            messagingSenderId: "378691379033",
            appId: "1:378691379033:web:ac841cf0d1d2446a7af648"
};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.firestore();

/* ================= APP ================= */
const App = () => {

    const [user, setUser] = useState(null);
    const [isAdmin, setIsAdmin] = useState(false);

    const [email, setEmail] = useState('');
    const [password, setPassword] = useState('');
    const [error, setError] = useState('');

    const [data, setData] = useState([]);

    const ADMIN_UIDS = ["6HmCH1dusWV0UGPU2gST4AUaCrJ2"];

    /* ===== AUTH ===== */
    useEffect(() => {
        const unsubscribe = auth.onAuthStateChanged((u) => {
            setUser(u);

            if (u && ADMIN_UIDS.includes(u.uid)) {
                setIsAdmin(true);
            } else {
                setIsAdmin(false);
            }
        });

        return () => unsubscribe();
    }, []);

    /* ===== LOGIN ===== */
    const login = async () => {
        try {
            await auth.signInWithEmailAndPassword(email, password);
            setError('');
        } catch (e) {
            setError("Credenciales incorrectas");
        }
    };

    /* ===== LOGOUT ===== */
    const logout = () => auth.signOut();

    /* ===== FIRESTORE ===== */
    useEffect(() => {
        if (!user) return;

        return db.collection("schedules")
        .onSnapshot(snapshot => {
            const arr = [];
            snapshot.forEach(doc => arr.push({id: doc.id, ...doc.data()}));
            setData(arr);
        });
    }, [user]);

    /* ===== ADMIN WRITE ===== */
    const addData = async () => {
        if (!isAdmin) return;

        await db.collection("schedules").add({
            subject: "Clase nueva",
            createdAt: new Date()
        });
    };

    /* ================= UI ================= */

    if (!user) {
        return (
            <div className="flex flex-col items-center justify-center h-screen gap-4">
                <h1 className="text-2xl font-bold">Login</h1>

                <input
                    className="p-2 text-black"
                    placeholder="Email"
                    onChange={e => setEmail(e.target.value)}
                />

                <input
                    type="password"
                    className="p-2 text-black"
                    placeholder="Password"
                    onChange={e => setPassword(e.target.value)}
                />

                <button onClick={login} className="bg-blue-500 px-4 py-2 rounded">
                    Ingresar
                </button>

                {error && <p className="text-red-500">{error}</p>}
            </div>
        );
    }

    return (
        <div className="p-6">

            <h1 className="text-xl mb-4">
                Bienvenido: {user.email}
            </h1>

            <button onClick={logout} className="bg-red-500 px-4 py-2 mb-4">
                Cerrar sesión
            </button>

            {isAdmin && (
                <button onClick={addData} className="bg-green-500 px-4 py-2 mb-4">
                    Agregar dato (Admin)
                </button>
            )}

            <h2 className="text-lg mb-2">Datos:</h2>

            {data.map(d => (
                <div key={d.id} className="bg-slate-800 p-2 mb-2">
                    {d.subject}
                </div>
            ))}

        </div>
    );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App />);

</script>
</body>
</html>
